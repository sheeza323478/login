<!DOCTYPE html>
<html>
<head>
    <title>Fixed Background Page</title>

    <style>
        body {
            margin: 0;
            padding: 0;

            background-image: url('image.jpg'); /* apni image ka naam */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed; /* image fixed rahegi */
        }

        .content {
            padding: 20px;
            height: 1500px; /* scroll enable karne ke liye */
            color: white;
            font-size: 20px;

            background-color: rgba(0, 0, 0, 0.5); /* text readable banane ke liye */
        }
    </style>

</head>

<body>

    <div class="content">
        <h1>Fixed Background Image Example</h1>

        <p>
            Yeh page scroll hoga lekin background image fix rahegi.
        </p>

        <p>
            Sirf content upar neeche move karega.
        </p>

        <p>
            Yeh assignment ke requirement ke mutabiq hai.
        </p>
    </div>

</body>

</html>
